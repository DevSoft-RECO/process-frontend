<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SADEC</title>
  <script>
    // PRE-BOOT THEME DETECTION: Prevents white flash during loading
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* --- NEW BORDERLESS ATOM LOADER (Mask & Conic Gradient Trick) --- */
    :root {
      --bg-light: radial-gradient(circle at center, #ffffff 0%, #f0f5f9 100%);
      --bg-dark: radial-gradient(circle at center, #1a202c 0%, #0f172a 100%);

      /* Brand Color Palette */
      --color-white: #ffffff;
      --color-green-dark: #027b10;
      --color-blue: #002d75;
      --color-green-light: #09b61d;
      --color-navy: #001f3f;
      --color-grey-sub: #7f8c8d;
      --color-grey-sub-dark: #94a3b8;
      --color-white-dark: #f1f5f9;
    }

    #loading-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--bg-light);
      z-index: 9999;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      gap: 3rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .dark #loading-wrapper {
      background: var(--bg-dark);
    }

    #page {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 200px;
      height: 200px;
      perspective: 1000px;
    }

    #h3 {
      color: var(--color-navy);
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 2px;
      z-index: 10;
    }

    .dark #h3 {
      color: var(--color-white-dark);
    }

    /* Common definition for the borderless rings */
    .ring-wrapper {
      position: absolute;
      width: 190px;
      height: 190px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ring-mask {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      /* MASK TRICK: Creates the thin ring shape without using borders */
      mask-image: radial-gradient(transparent 65%, black 67%);
      -webkit-mask-image: radial-gradient(transparent 65%, black 67%);
    }

    .ring-color {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      /* CONIC GRADIENT: Draws the specific arc segment */
      background: conic-gradient(transparent,
          var(--ring-color) 5deg,
          var(--ring-color) 45deg,
          transparent 50deg);
    }

    /* Original Animations applied to the mask containers */
    .ring-wrapper:nth-child(1) {
      --ring-color: var(--color-navy);
      animation: rotate1 2s linear infinite;
    }

    .dark .ring-wrapper:nth-child(1) {
      --ring-color: var(--color-white-dark);
    }

    .ring-wrapper:nth-child(2) {
      --ring-color: var(--color-green-dark);
      animation: rotate2 2s linear infinite;
    }

    .ring-wrapper:nth-child(3) {
      --ring-color: var(--color-blue);
      animation: rotate3 2s linear infinite;
    }

    .ring-wrapper:nth-child(4) {
      --ring-color: var(--color-green-light);
      animation: rotate4 2s linear infinite;
    }

    @keyframes rotate1 {
      from {
        transform: rotateX(50deg) rotateZ(110deg);
      }

      to {
        transform: rotateX(50deg) rotateZ(470deg);
      }
    }

    @keyframes rotate2 {
      from {
        transform: rotateX(20deg) rotateY(50deg) rotateZ(20deg);
      }

      to {
        transform: rotateX(20deg) rotateY(50deg) rotateZ(380deg);
      }
    }

    @keyframes rotate3 {
      from {
        transform: rotateX(40deg) rotateY(130deg) rotateZ(450deg);
      }

      to {
        transform: rotateX(40deg) rotateY(130deg) rotateZ(90deg);
      }
    }

    @keyframes rotate4 {
      from {
        transform: rotateX(70deg) rotateZ(270deg);
      }

      to {
        transform: rotateX(70deg) rotateZ(630deg);
      }
    }

    /* --- BRANDING TEXTS --- */
    .brand-group {
      text-align: center;
      animation: pulse-brand 2s ease-in-out infinite;
    }

    .brand-main {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--color-navy);
      letter-spacing: 0.15em;
      margin: 0;
      text-transform: uppercase;
    }

    .brand-main span {
      color: var(--color-green-light);
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--color-grey-sub);
      letter-spacing: 0.6em;
      margin: 4px 0 0 0;
      text-transform: uppercase;
      font-weight: 600;
    }

    .dark .brand-main {
      color: var(--color-white-dark);
    }

    .dark .brand-sub {
      color: var(--color-grey-sub-dark);
    }

    @keyframes pulse-brand {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.85;
        transform: scale(0.98);
      }
    }
  </style>
</head>

<body>
  <div id="loading-wrapper">
    <div id="page">
      <div id="container">
        <div class="ring-wrapper">
          <div class="ring-mask">
            <div class="ring-color"></div>
          </div>
        </div>
        <div class="ring-wrapper">
          <div class="ring-mask">
            <div class="ring-color"></div>
          </div>
        </div>
        <div class="ring-wrapper">
          <div class="ring-mask">
            <div class="ring-color"></div>
          </div>
        </div>
        <div class="ring-wrapper">
          <div class="ring-mask">
            <div class="ring-color"></div>
          </div>
        </div>
        <div id="h3">SADEC</div>
      </div>
    </div>

    <div class="brand-group">
      <h1 class="brand-main">PORTAL <span>YK</span></h1>
      <p class="brand-sub">SISTEMAS</p>
    </div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
